# GCP Cloud Build - CI (build) for Study Jam Week 2
# Configure trigger to build on push; use Cloud Run for CD (deploy).
steps:
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']
    id: install
    dir: '.'

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    id: build
    dir: '.'
    waitFor: ['install']

  # Build API image (context = repo root so package-lock.json is available)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_API_IMAGE}:$SHORT_SHA', '-f', 'apps/api/Dockerfile', '.']
    id: build-api
    waitFor: ['build']

  # Build Web image (context = repo root; optional: set _WEB_IMAGE for frontend deploy)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_WEB_IMAGE}:$SHORT_SHA', '-f', 'apps/web/Dockerfile', '--build-arg', 'VITE_API_URL=${_API_URL}', '.']
    id: build-web
    waitFor: ['build']

  # Tag images for Artifact Registry (use trigger substitutions: _AR_HOSTNAME, _AR_PROJECT_ID, _AR_REPOSITORY)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', '${_API_IMAGE}:$SHORT_SHA', '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/api:$SHORT_SHA']
    id: tag-api
    waitFor: ['build-api']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', '${_WEB_IMAGE}:$SHORT_SHA', '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/web:$SHORT_SHA']
    id: tag-web
    waitFor: ['build-web']

  # Push images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/api:$SHORT_SHA']
    id: push-api
    waitFor: ['tag-api']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/web:$SHORT_SHA']
    id: push-web
    waitFor: ['tag-web']

  # Deploy API to Cloud Run (use trigger substitutions: _SERVICE_NAME, _DEPLOY_REGION, _PLATFORM)
  - name: 'gcr.io/google.com/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/api:$SHORT_SHA'
      - '--region'
      - '${_DEPLOY_REGION}'
      - '--platform'
      - '${_PLATFORM}'
      - '--allow-unauthenticated'
    id: deploy-api
    waitFor: ['push-api']

substitutions:
  _API_IMAGE: api
  _WEB_IMAGE: web
  _API_URL: ''
  # Artifact Registry (override in trigger or leave as defaults)
  _AR_HOSTNAME: africa-south1-docker.pkg.dev
  _AR_PROJECT_ID: dvt-lab-devfest-2025
  _AR_REPOSITORY: study-jam-2026
  # Cloud Run deploy (override in trigger)
  _DEPLOY_REGION: africa-south1
  _PLATFORM: managed
  _SERVICE_NAME: study-jam-week2-monorepo

options:
  logging: CLOUD_LOGGING_ONLY
