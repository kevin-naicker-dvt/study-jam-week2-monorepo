# GCP Cloud Build - CI (build) for Study Jam Week 2
# Configure trigger to build on push; use Cloud Run for CD (deploy).
steps:
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']
    id: install
    dir: '.'

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    id: build
    dir: '.'
    waitFor: ['install']

  # Build API image (context = repo root so package-lock.json is available)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_API_IMAGE}:$SHORT_SHA', '-f', 'apps/api/Dockerfile', '.']
    id: build-api
    waitFor: ['build']

  # Build Web image (context = repo root; optional: set _WEB_IMAGE for frontend deploy)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_WEB_IMAGE}:$SHORT_SHA', '-f', 'apps/web/Dockerfile', '--build-arg', 'VITE_API_URL=${_API_URL}', '.']
    id: build-web
    waitFor: ['build']

  # Push images (uncomment and set _REGISTRY when using Artifact Registry / GCR)
  # - name: 'gcr.io/cloud-builders/docker'
  #   args: ['push', '${_REGISTRY}/api:$SHORT_SHA']
  #   waitFor: ['build-api']
  # - name: 'gcr.io/cloud-builders/docker'
  #   args: ['push', '${_REGISTRY}/web:$SHORT_SHA']
  #   waitFor: ['build-web']

substitutions:
  _API_IMAGE: api
  _WEB_IMAGE: web
  _API_URL: ''
  # _REGISTRY: gcr.io/YOUR_PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY
